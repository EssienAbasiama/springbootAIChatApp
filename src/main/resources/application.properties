spring.config.import=optional:file:.env[.properties]
spring.application.name=springbootAIChatApp

spring.ai.openai.api-key=${OPENAI_API_KEY}

# NOTE: use a model id your API key actually has access to.
# "gpt-5.4" is not a valid OpenAI model and will fail with a 404 at call time.
# Common valid ids: gpt-4o-mini (cheap/fast), gpt-4o, gpt-4.1
spring.ai.openai.chat.options.model=gpt-4o-mini

# Sampling temperature: 0.0 = deterministic, 1.0 = creative
spring.ai.openai.chat.options.temperature=0.7

# Actuator: expose health + info (visit /actuator/health)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# Metadata surfaced at /actuator/info
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=Simple AI Chat App using Spring Boot and Spring AI
info.app.version=0.0.1-SNAPSHOT
